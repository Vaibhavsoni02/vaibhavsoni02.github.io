ay: swap;\n  src: url(\"b6da6d08-10f5-45c9-b7d7-ca4f77e714f6\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Geist Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"5e691c48-cbed-4658-8fd1-97e89de4a95a\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Geist Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"4ece9922-33af-4189-a7ab-74cb640bc4f5\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\u002Fstyle>\n  <style>/* ============================================================\n   Optiblack — Color tokens\n   Source of truth: Figma \"02 Color\" styleguide (V.1 2024)\n   ============================================================ */\n\n:root {\n  /* --- Brand / Primary --- */\n  --ob-purple:        #824DEB;  /* primary action, highlights */\n  --ob-purple-bg:     #F5F0FF;  /* accent / tint background */\n  --ob-purple-hover:  #6F3FE0;  /* pressed/hover (derived) */\n\n  /* --- Ink / Neutrals base --- */\n  --ob-black:         #000000;  /* primary ink */\n  --ob-coffee:        #2C2827;  /* dark coffee — secondary buttons, dark sections */\n  --ob-white:         #FFFFFF;\n\n  /* --- Canvas --- */\n  --ob-cream:         #F9F7F3;  /* warm site canvas (marketing) */\n  --ob-mist:          #F1F2F2;  /* cool light fill */\n\n  /* --- Grayscale --- */\n  --ob-grey-50:       #F9F9F9;\n  --ob-grey-100:      #D8D8D8;\n  --ob-grey-200:      #ACACAC;\n  --ob-grey-300:      #949494;\n  --ob-grey-500:      #787878;\n  --ob-grey-700:      #585858;\n\n  /* --- Semantic --- */\n  --ob-error:         #FF4B4B;\n  --ob-error-bg:      #FFF2F2;\n  --ob-success:       #53E69C;\n  --ob-success-bg:    #E6FFF3;\n\n  /* --- Soft palette (subtle section & shape fills) --- */\n  --ob-soft-orange:   #EDC9B0;\n  --ob-soft-yellow:   #E7D9CA;\n  --ob-soft-green:    #C2DACE;\n  --ob-soft-red:      #E9B1AB;\n  --ob-soft-coral:    #EE9485;\n  --ob-soft-blue:     #CEE4FC;\n  --ob-soft-magenta:  #E9C3DE;  /* approximated — confirm with design */\n\n  /* --- Vivid accents (illustration, charts, dots) --- */\n  --ob-coral:         #D46B5F;\n  --ob-amber:         #F3942E;\n  --ob-aqua:          #40BBB3;\n  --ob-blue:          #508ED1;\n  --ob-green:         #62B28A;\n  --ob-lime:          #F0FB67;  /* chartreuse highlight dot */\n\n  /* ============================================================\n     Semantic aliases — prefer these in components\n     ============================================================ */\n\n  /* Surfaces */\n  --surface-page:        var(--ob-cream);\n  --surface-card:        var(--ob-white);\n  --surface-raised:      var(--ob-white);\n  --surface-sunken:      var(--ob-grey-50);\n  --surface-accent:      var(--ob-purple-bg);\n  --surface-dark:        var(--ob-coffee);\n  --surface-inverse:     var(--ob-black);\n\n  /* Text */\n  --text-primary:        var(--ob-black);\n  --text-body:           var(--ob-coffee);\n  --text-secondary:      var(--ob-grey-700);\n  --text-muted:          var(--ob-grey-500);\n  --text-disabled:       var(--ob-grey-300);\n  --text-on-dark:        var(--ob-white);\n  --text-on-accent:      var(--ob-white);\n  --text-link:           var(--ob-purple);\n\n  /* Borders */\n  --border-subtle:       var(--ob-grey-100);\n  --border-default:      #DCDCDC;\n  --border-strong:       var(--ob-black);\n  --border-accent:       var(--ob-purple);\n\n  /* Actions */\n  --action-primary:      var(--ob-purple);\n  --action-primary-hov:  var(--ob-purple-hover);\n  --action-secondary:    var(--ob-coffee);\n\n  /* Feedback */\n  --feedback-error:      var(--ob-error);\n  --feedback-error-bg:   var(--ob-error-bg);\n  --feedback-success:    var(--ob-success);\n  --feedback-success-bg: var(--ob-success-bg);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   Optiblack — Typography tokens\n   Display & text: Geist · UI labels/buttons/code: Geist Mono\n   (Styleguide labels use Avenir Next — substituted with Geist,\n    flag to design for the licensed face.)\n   ============================================================ */\n\n:root {\n  /* --- Families --- */\n  --font-display: \"Geist\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, \"Helvetica Neue\", Arial, sans-serif;\n  --font-sans:    \"Geist\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, \"Helvetica Neue\", Arial, sans-serif;\n  --font-mono:    \"Geist Mono\", ui-monospace, \"SF Mono\", Menlo, Consolas, monospace;\n  --font-label:   \"Geist\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif; /* Avenir Next substitute */\n\n  /* --- Weights --- */\n  --fw-light:     300; /* @kind other */\n  --fw-regular:   400; /* @kind other */\n  --fw-medium:    500; /* @kind other */\n  --fw-semibold:  600; /* @kind other */\n  --fw-bold:      700; /* @kind other */\n\n  /* --- Type scale (px) --- */\n  --fs-display:   120px;  /* styleguide hero */\n  --fs-h1:        72px;\n  --fs-h2:        56px;\n  --fs-h3:        48px;\n  --fs-hero:      60px;   /* marketing hero */\n  --fs-xxl:       40px;\n  --fs-h5:        24px;\n  --fs-h6:        18px;\n  --fs-h7:        16px;\n  --fs-body-xl:   24px;\n  --fs-body-lg:   18px;\n  --fs-body:      16px;\n  --fs-body-sm:   14px;\n  --fs-caption:   12px;\n\n  /* --- Line heights --- */\n  --lh-tight:     100%; /* @kind other */\n  --lh-snug:      1.25; /* @kind other */\n  --lh-body:      1.5; /* @kind other */\n  --lh-relaxed:   1.6; /* @kind other */\n\n  /* --- Letter spacing --- */\n  --ls-display:   -2px; /* @kind other */\n  --ls-heading:   -1px; /* @kind other */\n  --ls-tight:     -0.5px; /* @kind other */\n  --ls-caption:   0.8px;  /* @kind other */\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   Optiblack — Spacing, radius & layout tokens\n   8px base grid\n   ============================================================ */\n\n:root {\n  /* --- Spacing scale --- */\n  --space-0:   0;\n  --space-1:   4px;\n  --space-2:   8px;\n  --space-3:   12px;\n  --space-4:   16px;\n  --space-5:   20px;\n  --space-6:   24px;\n  --space-8:   32px;\n  --space-10:  40px;\n  --space-12:  48px;\n  --space-16:  64px;\n  --space-20:  80px;\n  --space-30:  120px;  /* marketing section gutter */\n\n  /* --- Radius --- */\n  --radius-sm:    4px;\n  --radius-md:    5px;   /* feature cards */\n  --radius-lg:    8px;   /* inputs, panels */\n  --radius-xl:    16px;\n  --radius-2xl:   24px;  /* tags / chips */\n  --radius-pill:  99px;  /* buttons */\n  --radius-full:  9999px;\n\n  /* --- Layout --- */\n  --container-max:      1280px;\n  --container-pad:      120px;  /* desktop horizontal gutter */\n  --container-pad-md:   32px;\n  --header-height:      90px;\n  --section-pad-y:      80px;\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   Optiblack — Shadow, border & motion tokens\n   ============================================================ */\n\n:root {\n  /* --- Elevation --- */\n  --shadow-1:  0 1px 2px rgba(16,24,40,0.05);\n  --shadow-2:  0 4px 12px rgba(16,24,40,0.08);\n  --shadow-3:  0 12px 32px rgba(16,24,40,0.10);\n  --shadow-card:    0 2px 16px rgba(44,40,39,0.06);\n  --shadow-pop:     0 16px 48px rgba(44,40,39,0.14);\n\n  /* hairline ring used on styleguide tags/specimen pills */\n  --ring-hairline:  inset 0 0 0 0.5px var(--ob-black);\n  --ring-accent:    inset 0 0 0 1px var(--ob-purple);\n\n  /* --- Borders --- */\n  --border-width:   1px; /* @kind other */\n  --border-hairline: 0.5px; /* @kind other */\n\n  /* --- Motion --- */\n  --ease-standard:  cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */\n  --ease-out:       cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */\n  --dur-fast:       120ms; /* @kind other */\n  --dur-base:       200ms; /* @kind other */\n  --dur-slow:       320ms; /* @kind other */\n\n  /* --- Soft radial glows (hero shapes) --- */\n  --glow-pink:  radial-gradient(circle at 50% 50%, rgba(244,128,212,0.2) 39%, rgba(244,128,212,0) 100%); /* @kind other */\n  --glow-aqua:  radial-gradient(circle at 50% 50%, rgba(69,201,193,0.2) 39%, rgba(69,201,193,0) 100%); /* @kind other */\n}\n<\u002Fstyle>\n  <style>/* Generated from Figma Variables. First mode = :root default.\n   FLOAT tokens are unitless — multiply by 1px in calc() where a length is needed. */\n\n:root {\n  --background-grey: rgb(26,26,26); /* @kind color */\n  --bg-soft-200: var(--neutral-200); /* @kind color */\n  --bg-surface-700: var(--neutral-700); /* @kind color */\n  --bg-weak-100: var(--neutral-100-2); /* @kind color */\n  --bg-white-0: var(--neutral-0); /* @kind color */\n  --black-2: rgb(0,0,0); /* @kind color */\n  --black: rgb(0,0,0); /* @kind color */\n  --blue-base: rgb(55,93,251); /* @kind color */\n  --blue-dark: rgb(37,62,167); /* @kind color */\n  --blue-darker: rgb(22,38,100); /* @kind color */\n  --blue-light: rgb(194,214,255); /* @kind color */\n  --blue-lighter: rgb(235,241,255); /* @kind color */\n  --border-radius-4-px: 4;\n  --color-tokens-content-dark-primary: var(--globalcolors-neutral-100); /* @kind color */\n  --colors-background-bg-primary: var(--colors-base-white); /* @kind color */\n  --colors-background-bg-quaternary: var(--colors-gray-light-mode-200); /* @kind color */\n  --colors-background-bg-tertiary: var(--colors-gray-light-mode-100); /* @kind color */\n  --colors-base-white: rgb(255,255,255); /* @kind c 0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ============================================================\n   Optiblack — Color tokens\n   Source of truth: Figma \"02 Color\" styleguide (V.1 2024)\n   ============================================================ */\n\n:root {\n  /* --- Brand / Primary --- */\n  --ob-purple:        #824DEB;  /* primary action, highlights */\n  --ob-purple-bg:     #F5F0FF;  /* accent / tint background */\n  --ob-purple-hover:  #6F3FE0;  /* pressed/hover (derived) */\n\n  /* --- Ink / Neutrals base --- */\n  --ob-black:         #000000;  /* primary ink */\n  --ob-coffee:        #2C2827;  /* dark coffee — secondary buttons, dark sections */\n  --ob-white:         #FFFFFF;\n\n  /* --- Canvas --- */\n  --ob-cream:         #F9F7F3;  /* warm site canvas (marketing) */\n  --ob-mist:          #F1F2F2;  /* cool light fill */\n\n  /* --- Grayscale --- */\n  --ob-grey-50:       #F9F9F9;\n  --ob-grey-100:      #D8D8D8;\n  --ob-grey-200:      #ACACAC;\n  --ob-grey-300:      #949494;\n  --ob-grey-500:      #787878;\n  --ob-grey-700:      #585858;\n\n  /* --- Semantic --- */\n  --ob-error:         #FF4B4B;\n  --ob-error-bg:      #FFF2F2;\n  --ob-success:       #53E69C;\n  --ob-success-bg:    #E6FFF3;\n\n  /* --- Soft palette (subtle section & shape fills) --- */\n  --ob-soft-orange:   #EDC9B0;\n  --ob-soft-yellow:   #E7D9CA;\n  --ob-soft-green:    #C2DACE;\n  --ob-soft-red:      #E9B1AB;\n  --ob-soft-coral:    #EE9485;\n  --ob-soft-blue:     #CEE4FC;\n  --ob-soft-magenta:  #E9C3DE;  /* approximated — confirm with design */\n\n  /* --- Vivid accents (illustration, charts, dots) --- */\n  --ob-coral:         #D46B5F;\n  --ob-amber:         #F3942E;\n  --ob-aqua:          #40BBB3;\n  --ob-blue:          #508ED1;\n  --ob-green:         #62B28A;\n  --ob-lime:          #F0FB67;  /* chartreuse highlight dot */\n\n  /* ============================================================\n     Semantic aliases — prefer these in components\n     ============================================================ */\n\n  /* Surfaces */\n  --surface-page:        var(--ob-cream);\n  --surface-card:        var(--ob-white);\n  --surface-raised:      var(--ob-white);\n  --surface-sunken:      var(--ob-grey-50);\n  --surface-accent:      var(--ob-purple-bg);\n  --surface-dark:        var(--ob-coffee);\n  --surface-inverse:     var(--ob-black);\n\n  /* Text */\n  --text-primary:        var(--ob-black);\n  --text-body:           var(--ob-coffee);\n  --text-secondary:      var(--ob-grey-700);\n  --text-muted:          var(--ob-grey-500);\n  --text-disabled:       var(--ob-grey-300);\n  --text-on-dark:        var(--ob-white);\n  --text-on-accent:      var(--ob-white);\n  --text-link:           var(--ob-purple);\n\n  /* Borders */\n  --border-subtle:       var(--ob-grey-100);\n  --border-default:      #DCDCDC;\n  --border-strong:       var(--ob-black);\n  --border-accent:       var(--ob-purple);\n\n  /* Actions */\n  --action-primary:      var(--ob-purple);\n  --action-primary-hov:  var(--ob-purple-hover);\n  --action-secondary:    var(--ob-coffee);\n\n  /* Feedback */\n  --feedback-error:      var(--ob-error);\n  --feedback-error-bg:   var(--ob-error-bg);\n  --feedback-success:    var(--ob-success);\n  --feedback-success-bg: var(--ob-success-bg);\n}\n\n/* ============================================================\n   Optiblack — Typography tokens\n   Display & text: Geist · UI labels/buttons/code: Geist Mono\n   (Styleguide labels use Avenir Next — substituted with Geist,\n    flag to design for the licensed face.)\n   ============================================================ */\n\n:root {\n  /* --- Families --- */\n  --font-display: \"Geist\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, \"Helvetica Neue\", Arial, sans-serif;\n  --font-sans:    \"Geist\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, \"Helvetica Neue\", Arial, sans-serif;\n  --font-mono:    \"Geist Mono\", ui-monospace, \"SF Mono\", Menlo, Consolas, monospace;\n  --font-label:   \"Geist\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif; /* Avenir Next substitute */\n\n  /* --- Weights --- */\n  --fw-light:     300; /* @kind other */\n  --fw-regular:   400; /* @kind other */\n  --fw-medium:    500; /* @kind other */\n  --fw-semibold:  600; /* @kind other */\n  --fw-bold:      700; /* @kind other */\n\n  /* --- Type scale (px) --- */\n  --fs-display:   120px;  /* styleguide hero */\n  --fs-h1:        72px;\n  --fs-h2:        56px;\n  --fs-h3:        48px;\n  --fs-hero:      60px;   /* marketing hero */\n  --fs-xxl:       40px;\n  --fs-h5:        24px;\n  --fs-h6:        18px;\n  --fs-h7:        16px;\n  --fs-body-xl:   24px;\n  --fs-body-lg:   18px;\n  --fs-body:      16px;\n  --fs-body-sm:   14px;\n  --fs-caption:   12px;\n\n  /* --- Line heights --- */\n  --lh-tight:     100%; /* @kind other */\n  --lh-snug:      1.25; /* @kind other */\n  --lh-body:      1.5; /* @kind other */\n  --lh-relaxed:   1.6; /* @kind other */\n\n  /* --- Letter spacing --- */\n  --ls-display:   -2px; /* @kind other */\n  --ls-heading:   -1px; /* @kind other */\n  --ls-tight:     -0.5px; /* @kind other */\n  --ls-caption:   0.8px;  /* @kind other */\n}\n\n/* ============================================================\n   Optiblack — Spacing, radius & layout tokens\n   8px base grid\n   ============================================================ */\n\n:root {\n  /* --- Spacing scale --- */\n  --space-0:   0;\n  --space-1:   4px;\n  --space-2:   8px;\n  --space-3:   12px;\n  --space-4:   16px;\n  --space-5:   20px;\n  --space-6:   24px;\n  --space-8:   32px;\n  --space-10:  40px;\n  --space-12:  48px;\n  --space-16:  64px;\n  --space-20:  80px;\n  --space-30:  120px;  /* marketing section gutter */\n\n  /* --- Radius --- */\n  --radius-sm:    4px;\n  --radius-md:    5px;   /* feature cards */\n  --radius-lg:
